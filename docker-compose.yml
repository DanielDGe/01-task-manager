services:
  postgres:
    image: postgres:16
    container_name: task-manager-db
    restart: always
    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - task_manager_data:/var/lib/postgresql/data

volumes:
  task_manager_data: